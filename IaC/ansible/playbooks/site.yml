---
- name: Configure dePIN testbed nodes
  hosts: all
  become: true
  vars:
    # This value is expected to be injected later from the smart-contract folder.
    node_registry_contract_id: "{{ node_registry_contract_id | default(omit) }}"
  roles:
    - role: docker
    - role: worker
      when: "'worker' in group_names"
    - role: dist
      when: "'dist' in group_names"
    - role: coordinator
      when: "'coordinator' in group_names"
