---
- name: Pull vclient bot image
  ansible.builtin.command:
    cmd: "docker pull {{ XAISEN_VCLIENT_IMAGE }}"
  changed_when: "'Downloaded newer image' in vclient_pull.stdout"
  register: vclient_pull

- name: Remove existing vclient container
  ansible.builtin.command:
    cmd: "docker rm -f {{ vclient_container_name }}"
  failed_when: false
  changed_when: vclient_remove.rc == 0
  register: vclient_remove

- name: Run vclient bot container
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ vclient_container_name }}
      --restart unless-stopped
      --env ROUTES_URL
      --env ROOM_NAME
      --env BOT_COUNT
      --env SESSION_DURATION
      {{ XAISEN_VCLIENT_IMAGE }}
  environment:
    ROUTES_URL: "{{ dist_url }}"
    ROOM_NAME: "{{ vclient_room_name }}"
    BOT_COUNT: "{{ vclient_bot_count }}"
    SESSION_DURATION: "{{ vclient_session_duration }}"
