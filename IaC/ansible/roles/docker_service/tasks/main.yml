---
- name: Skip docker deployment for hosts with no xaisen_service
  ansible.builtin.meta: end_host
  when: xaisen_service is not defined or xaisen_service | length == 0

- name: Install Docker
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Log in to the container registry
  community.docker.docker_login:
    registry_url: "{{ xaisen_registry_host }}"
    username: "{{ xaisen_registry_username }}"
    password: "{{ xaisen_registry_password }}"
  no_log: true
  when: xaisen_registry_host is defined

- name: Ensure persistent state directory exists
  ansible.builtin.file:
    path: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Derive routes sslip.io endpoint
  ansible.builtin.set_fact:
    xaisen_routes_hostname: "{{ ansible_host }}.sslip.io"
    xaisen_routes_public_url: "https://{{ ansible_host }}.sslip.io/api"
  when: xaisen_service == "routes"

- name: Create routes proxy state directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop:
    - "{{ xaisen_services_root }}/runtime/routes/caddy-data"
    - "{{ xaisen_services_root }}/runtime/routes/caddy-config"
  when: xaisen_service == "routes"

- name: Write routes Caddy configuration
  ansible.builtin.copy:
    dest: "{{ xaisen_services_root }}/runtime/routes/Caddyfile"
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ xaisen_routes_hostname }} {
        reverse_proxy xaisen-routes:3001
      }
  when: xaisen_service == "routes"

- name: Ensure private routes Docker network exists
  community.docker.docker_network:
    name: xaisen-routes
    state: present
  when: xaisen_service == "routes"

- name: Check for a per-service secrets file locally
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../../secrets/services/{{ xaisen_service }}.env"
  delegate_to: localhost
  become: false
  register: xaisen_service_secrets_file

- name: Copy per-service secrets file to host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../secrets/services/{{ xaisen_service }}.env"
    dest: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}/service.env"
    owner: root
    group: root
    mode: "0640"
  when: xaisen_service_secrets_file.stat.exists | default(false)

- name: Run the service container
  community.docker.docker_container:
    name: "xaisen-{{ xaisen_service }}"
    image: "{{ xaisen_images[xaisen_service] }}:{{ xaisen_tags[xaisen_service] }}"
    restart_policy: unless-stopped
    state: "{{ 'started' if xaisen_desired_state == 'running' else 'stopped' }}"
    restart: "{{ (xaisen_container_state | default('started')) == 'restarted' }}"
    network_mode: "{{ 'host' if xaisen_service == 'media' else omit }}"
    ports: "{{ omit if xaisen_service in ['routes', 'media'] else ([xaisen_port ~ ':' ~ xaisen_port] if (xaisen_port | default(0) | int > 0) else []) }}"
    networks: "{{ [{'name': 'xaisen-routes'}] if xaisen_service == 'routes' else omit }}"
    env_file: "{{ (xaisen_services_root ~ '/runtime/' ~ xaisen_service ~ '/service.env') if (xaisen_service_secrets_file.stat.exists | default(false)) else omit }}"
    volumes:
      - "{{ xaisen_services_root }}/runtime/contract:{{ xaisen_services_root }}/runtime/contract:ro"
      - "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}:{{ xaisen_services_root }}/runtime/{{ xaisen_service }}"
    env:
      CONTRACT_ENV_PATH: "{{ xaisen_services_root }}/runtime/contract/{{ xaisen_env }}.env"
      CONTRACT_NETWORK: "{{ xaisen_env }}"
      ROUTES_OPERATOR_KEY_PATH: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}/{{ inventory_hostname }}.json"
      ROUTES_INSTANCE_NAME: "{{ inventory_hostname }}"
      ROUTES_PUBLIC_URL: "{{ xaisen_routes_public_url if xaisen_service == 'routes' else omit }}"
      NODE_IP: "{{ ansible_host if xaisen_service == 'media' else omit }}"
      UDP_PORT: "{{ '50000-60000' if xaisen_service == 'media' else omit }}"
      XAISEN_AUTO_CLUSTER_KEY: "{{ 'true' if xaisen_service == 'media' else omit }}"
      XAISEN_BROKER_ADDR: "{{ ':7890' if xaisen_service == 'media' else omit }}"
      XAISEN_MEDIA_KEY_PATH: "{{ (xaisen_services_root ~ '/runtime/media/x25519.key') if xaisen_service == 'media' else omit }}"
  when:
    - xaisen_images is defined and xaisen_service in xaisen_images
    - xaisen_tags is defined and xaisen_service in xaisen_tags

- name: Run routes HTTPS proxy
  community.docker.docker_container:
    name: xaisen-routes-proxy
    image: "{{ xaisen_registry_host }}/xaisen/caddy:2-alpine"
    pull: always
    restart_policy: unless-stopped
    state: "{{ 'started' if xaisen_desired_state == 'running' else 'stopped' }}"
    restart: "{{ (xaisen_container_state | default('started')) == 'restarted' }}"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - name: xaisen-routes
    volumes:
      - "{{ xaisen_services_root }}/runtime/routes/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "{{ xaisen_services_root }}/runtime/routes/caddy-data:/data"
      - "{{ xaisen_services_root }}/runtime/routes/caddy-config:/config"
  when: xaisen_service == "routes"

- name: Wait for routes trusted HTTPS endpoint
  ansible.builtin.uri:
    url: "{{ xaisen_routes_public_url }}/contract/health"
    method: GET
    status_code: 200
    validate_certs: true
  delegate_to: localhost
  become: false
  register: xaisen_routes_https_health
  until: xaisen_routes_https_health.status | default(0) == 200
  retries: 60
  delay: 5
  when:
    - xaisen_service == "routes"
    - xaisen_desired_state == "running"
