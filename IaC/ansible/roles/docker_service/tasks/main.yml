---
- name: Skip docker deployment for hosts with no xaisen_services
  ansible.builtin.meta: end_host
  when: xaisen_services is not defined or xaisen_services | length == 0

- name: Install Docker
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Log in to the container registry
  community.docker.docker_login:
    registry_url: "{{ xaisen_registry_host }}"
    username: "{{ xaisen_registry_username }}"
    password: "{{ xaisen_registry_password }}"
  no_log: true
  when: xaisen_registry_host is defined

# Shared user-defined bridge network for this host's containers. Docker's
# DEFAULT bridge network does NOT support container-name DNS resolution --
# only user-defined networks do -- and the shared Caddy TLS proxy below
# needs to reverse_proxy to each relay/signaling container by name
# (xaisen-<worker_key>). Idempotent; safe to (re)ensure on every run
# regardless of which services this round's xaisen_services happens to
# include.
- name: Ensure shared xaisen docker network exists
  community.docker.docker_network:
    name: xaisen-net
    state: present

# One host can run several services (colocation). Everything below is
# per-service (its own state dir, secrets file, wallet file, container),
# so it's isolated in an included task file run once per xaisen_services
# entry rather than a single-service task list.
- name: Deploy each service on this host
  ansible.builtin.include_tasks: deploy_one_service.yml
  loop: "{{ xaisen_services }}"
  loop_control:
    loop_var: xaisen_service_item
    label: "{{ xaisen_service_item.worker_key | default(xaisen_service_item.service) }}"

# Every relay/signaling instance on this host shares ONE Caddy TLS proxy --
# ports 80/443 can only be bound once per host, so this can't be a
# per-instance sidecar (see deploy_one_service.yml's endpoint-URL comment
# for why each instance still gets its own sslip.io hostname/cert via a
# distinct Caddyfile site block keyed by worker_key).
- name: Determine which colocated services need the shared Caddy TLS proxy
  ansible.builtin.set_fact:
    xaisen_public_services: "{{ xaisen_services | selectattr('service', 'in', ['relay', 'signaling', 'bot']) | list }}"

- name: Ensure Caddy config directory exists
  ansible.builtin.file:
    path: "{{ xaisen_services_root }}/runtime/caddy"
    state: directory
    owner: root
    group: root
    mode: "0750"
  when: xaisen_public_services | length > 0

- name: Write shared Caddyfile (one site block per relay/signaling instance)
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ xaisen_services_root }}/runtime/caddy/Caddyfile"
    owner: root
    group: root
    mode: "0644"
  when: xaisen_public_services | length > 0
  register: xaisen_caddyfile_write

- name: Run the shared Caddy TLS proxy container
  community.docker.docker_container:
    name: xaisen-caddy
    image: "caddy:2-alpine"
    restart_policy: unless-stopped
    state: started
    restart: "{{ xaisen_caddyfile_write is changed }}"
    networks:
      - name: xaisen-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "{{ xaisen_services_root }}/runtime/caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "{{ xaisen_services_root }}/runtime/caddy/data:/data"
      - "{{ xaisen_services_root }}/runtime/caddy/config:/config"
  when: xaisen_public_services | length > 0
