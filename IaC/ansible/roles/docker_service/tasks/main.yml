---
- name: Skip docker deployment for hosts with no xaisen_service
  ansible.builtin.meta: end_host
  when: xaisen_service is not defined or xaisen_service | length == 0

- name: Install Docker
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Log in to the container registry
  community.docker.docker_login:
    registry_url: "{{ xaisen_registry_host }}"
    username: "{{ xaisen_registry_username }}"
    password: "{{ xaisen_registry_password }}"
  no_log: true
  when: xaisen_registry_host is defined

- name: Ensure persistent state directory exists
  ansible.builtin.file:
    path: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Check for a per-service secrets file locally
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../../secrets/services/{{ xaisen_service }}.env"
  delegate_to: localhost
  become: false
  register: xaisen_service_secrets_file

- name: Copy per-service secrets file to host
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../secrets/services/{{ xaisen_service }}.env"
    dest: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}/service.env"
    owner: root
    group: root
    mode: "0640"
  when: xaisen_service_secrets_file.stat.exists | default(false)

- name: Check for an existing operator state file on the host
  ansible.builtin.stat:
    path: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}/{{ inventory_hostname }}.json"
  register: xaisen_existing_operator_state

# TODO: this JSON file is written generically (any xaisen_service), but no
# worker role currently reads it from this path. Each new worker app expects
# its own differently-named keypair env var instead (CP_KEYPAIR,
# SIGNALING_KEYPAIR, PRIVATE_KEY for relay, SUI_PRIVATE_KEY for
# validator-daemon) rather than a single JSON file path the way legacy
# routes' self-registration TypeScript did. Wiring xaisen_operator_wallet_json
# into the correct per-app env var is a follow-up; until then this task only
# persists the file, nothing consumes it.
- name: Write operator wallet credentials
  ansible.builtin.copy:
    dest: "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}/{{ inventory_hostname }}.json"
    owner: root
    group: root
    mode: "0600"
    content: "{{ xaisen_operator_wallet_json }}"
  when: xaisen_operator_wallet_json is defined and not xaisen_existing_operator_state.stat.exists
  no_log: true
  register: xaisen_wallet_credentials_write

- name: Run the service container
  community.docker.docker_container:
    name: "xaisen-{{ xaisen_service }}"
    image: "{{ xaisen_images[xaisen_service] }}:{{ xaisen_tags[xaisen_service] }}"
    restart_policy: unless-stopped
    state: "{{ 'started' if xaisen_desired_state == 'running' else 'stopped' }}"
    restart: "{{ (xaisen_container_state | default('started')) == 'restarted' or xaisen_wallet_credentials_write is changed }}"
    # TODO: this only publishes a single TCP port (xaisen_port). relay also
    # needs its UDP RTC/pipe port ranges published (10000-10100, 40000-40100 —
    # see services/worker/apps/relay/.env.example); not modeled here yet.
    ports: "{{ [xaisen_port ~ ':' ~ xaisen_port] if (xaisen_port | default(0) | int > 0) else [] }}"
    env_file: "{{ (xaisen_services_root ~ '/runtime/' ~ xaisen_service ~ '/service.env') if (xaisen_service_secrets_file.stat.exists | default(false)) else omit }}"
    volumes:
      - "{{ xaisen_services_root }}/runtime/contract:{{ xaisen_services_root }}/runtime/contract:ro"
      - "{{ xaisen_services_root }}/runtime/{{ xaisen_service }}:{{ xaisen_services_root }}/runtime/{{ xaisen_service }}"
    env:
      CONTRACT_ENV_PATH: "{{ xaisen_services_root }}/runtime/contract/{{ xaisen_env }}.env"
      CONTRACT_NETWORK: "{{ xaisen_env }}"
  when:
    - xaisen_images is defined and xaisen_service in xaisen_images
    - xaisen_tags is defined and xaisen_service in xaisen_tags
